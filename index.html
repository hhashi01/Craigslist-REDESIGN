<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Craiglist Redesign</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
<nav class="nav">
  <a class="nav-logo" href="#">Craigslist</a>
  <div class="nav-right">
    <div  class=nav-location">Charlotte, NC</div>
    <div class="nav-menu">
      <!--Not sure about handling the spacing this way; it makes sense with the Css
      but could probably be done more elengantly - Zach-->
        <span></span>
        <span></span>
        <span></span>
    </div>
  </div>
</nav>

  <section class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-toggle"></div>
    <div class="hero-content">
      <h1>
        Find your next everything on
        <span>Craigslist</span>
      </h1>
    </div>
    <div class="search-bar">
      <input type="text" placeholder="Search items...">
      <button>Search</button>
    </div>
  </section>

  <section class="listings">
    <h2>Items You Might Like</h2>

    <div class="cards">

      <div class="card">
        <img src="https://m.media-amazon.com/images/I/81QVBFbg2qL._AC_SX679_.jpg">
        <div class="card-label">
          <h3>Restored '57 Mustang</h3>
          <p>Harrisburg</p>
        </div>
      </div>

    </div>
          <div class="card">
        <img src="https://images.pexels.com/photos/100582/pexels-photo-100582.jpeg" alt="Bicycle">
        <div class="card-label">
          <h3>Bicycle</h3>
          <p>Mint Hill</p>
        </div>
      </div>

      <div class="card">
        <img src="https://t3.ftcdn.net/jpg/04/90/49/92/360_F_490499266_3eqAX0Gtipn97bc1OQDtxh0IuvtYVNkt.jpg" alt="Potted Snake Plant">
        <div class="card-label">
          <h3>Potted Snake Plant</h3>
          <p>University City</p>
        </div>

      </div>
  </section>

</body>
</html>
