<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item List</title>
    <link rel="stylesheet" href="styles.css" /> 
</head>

<body class="responsive">

  <a class="skip-link" href="#content">Skip to main content</a>

  <header>
    <div data-include="navigations/header.html"></div>
  </header>
    <main id="content" class="content">
        <h2>Item List</h2>
        <p>This is the item list page.</p>
    </main>
  
    <script src="scripts/HTMLInclude.js"></script>
    <script>
    function initNav() {
    const menuToggle = document.querySelector('.menu-toggle');
    const nav = document.querySelector('.nav');

    if (menuToggle && nav) {
      menuToggle.addEventListener('click', () => {
        nav.classList.toggle('open');
        menuToggle.classList.toggle('active');
      });
    } else {
      // If elements aren't found yet, try again shortly
      setTimeout(initNav, 50);
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(initNav, 100);
  });
</script>
  
  </body>
</html>
