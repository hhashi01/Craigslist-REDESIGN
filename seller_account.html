<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seller Account</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="seller_account_style.css">
  <script src="scripts/hamburger_menu.js" defer></script>
  <script src="scripts/header_footer.js" defer></script>
</head>

<body>

  <div id="nav-placeholder"></div>

  <main class="seller-page">

    <!-- Seller profile section -->
    <section class="seller-profile">
      <img src="images/guy.webp"class="seller-photo">
      <div class="seller-info">
        <h2 class="seller-name">John Doe</h2>
        <h5 class="seller-label">Seller</h5>
        <p class="seller-rating">★★★★☆</p>
        <p class="seller-bio">Selling cars and counting cash</p>
      </div>
    </section>

    <!-- Seller reviews section -->
    <section class="seller-reviews">
      <h3>Recent reviews of this seller:</h3>
      <div class="review-scroll">

        <article class="review-card">
          <img src="images/car1.png">
          <h4>Honda Accord User</h4>
          <p class="review-stars">★★★★★</p>
        </article>

        <article class="review-card">
          <img src="images/bmw.png">
          <h4>BMW Used</h4>
          <p class="review-stars">★★★★☆</p>
        </article>

        <article class="review-card">
          <img src="images/2015_jeep_cherokee_-removebg-preview.png">
          <h4>Jeep Cherokee Used</h4>
          <p class="review-stars">★★★★★</p>
        </article>

      </div>
      <div class="review-dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </section>

  </main>

  <div id="footer-placeholder"></div>

</body>
</html>
