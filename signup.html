<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Craiglist Redesign</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="scripts/darkmode.js"></script>
  <script src="scripts/hamburger_menu.js" defer></script>
  <script src="scripts/header_footer.js" defer></script>


    <div id="nav-placeholder"></div>  

  <h1>Sign up for a Craiglist account. It's free, and always will be.</h1>
  <p>For your safety, accounts may not be anonymous.</p>

    <section class="form-section">
    <h2>Contact Us</h2>
    <form id="contactForm" novalidate>
    <label for="name">Name</label>
    <input type="text" id="name" />
    <small class="error"></small>
    <label for="email">Email</label>
    <input type="email" id="email" />
    <small class="error"></small>

    <button type="submit">Send</button>
    </form>
    </section>
    <script src="scripts/signup.js"></script>

    <div id="footer-placeholder"></div>

</body>
</html>
