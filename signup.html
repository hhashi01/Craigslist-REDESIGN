<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Craigslist Redesign</title>
  <link rel="stylesheet" href="indexstyles.css" />
  <link rel="stylesheet" href="signup.css" />
  <script src="scripts/darkmode.js"></script>
</head>
<body>

  <div id="nav-placeholder"></div>

  <main class="signup-page">
    <div class="signup-container">

      <div class="signup-header">
        <h1 class="signup-title">Create your account.</h1>
        <p class="signup-sub">It's free, and always will be.</p>
        <p class="signup-note">For your safety, accounts may not be anonymous.</p>
      </div>

      <!-- ── SIGN-UP FORM ── -->
      <form id="signupForm" class="signup-form" autocomplete="on">

        <!-- Full Name -->
        <div class="field-group" id="group-name">
          <label class="field-label" for="name">
            Full Name <span class="req-star" >*</span>
          </label>
          <div class="field-wrap">
            <input
              type="text"
              id="name"
              name="name"
              autocomplete="name"
              placeholder="Jane Smith"
            />
            <span class="field-icon" ></span>
          </div>
          <small class="field-error" id="name-error" role="alert" ></small>
        </div>

        <!-- Email -->
        <div class="field-group" id="group-email">
          <label class="field-label" for="email">
            Email Address <span class="req-star">*</span>
          </label>
          <div class="field-wrap">
            <input
              type="email"
              id="email"
              name="email"
              autocomplete="email"
              placeholder="jane@example.com"
            />
            <span class="field-icon"></span>
          </div>
          <small class="field-error" id="email-error" role="alert"></small>
        </div>

        <!-- Phone (optional) -->
        <div class="field-group" id="group-phone">
          <label class="field-label" for="phone">
            Phone Number <span class="optional-tag">(optional)</span>
          </label>
          <div class="field-wrap">
            <input
              type="tel"
              id="phone"
              name="phone"
              autocomplete="tel"
              placeholder="(555) 000-0000"
            />
            <span class="field-icon"></span>
          </div>
          <small class="field-error" id="phone-error" role="alert"></small>
        </div>

        <!-- Password -->
        <div class="field-group" id="group-password">
          <label class="field-label" for="password">
            Password <span class="req-star">*</span>
          </label>
          <div class="field-wrap">
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="new-password"
              placeholder="Create a strong password"
            />
            <button
              type="button"
              class="toggle-pw"
              data-target="password"
            >Show</button>
            <span class="field-icon"></span>
          </div>

          <!-- Strength meter -->
          <div class="strength-wrap" id="strength-wrap" hidden>
            <div class="strength-track">
              <div class="strength-fill" id="strength-fill"></div>
            </div>
            <span class="strength-text" id="strength-text" id="password-strength-label"></span>
          </div>

          <small class="field-error" id="password-error" role="alert"></small>
        </div>

        <!-- Confirm Password -->
        <div class="field-group" id="group-confirm">
          <label class="field-label" for="confirm">
            Confirm Password <span class="req-star">*</span>
          </label>
          <div class="field-wrap">
            <input
              type="password"
              id="confirm"
              name="confirm"
              autocomplete="new-password"
              placeholder="Repeat your password"
            />
            <button
              type="button"
              class="toggle-pw"
              data-target="confirm"
            >Show</button>
            <span class="field-icon"></span>
          </div>
          <small class="field-error" id="confirm-error" role="alert"></small>
        </div>

        <!-- Required field note -->
        <p class="required-note"><span class="req-star">*</span> Required fields</p>

        <button type="submit" class="signup-submit" id="signup-btn">
          Create Account
        </button>

      </form>

      <!-- ── SUCCESS STATE ── -->
      <div class="signup-success" id="signup-success" hidden>
        <div class="success-check">✓</div>
        <h2>You're all set!</h2>
        <p>Your Craigslist account has been created. Welcome aboard.</p>
        <a href="index.html" class="success-home-btn">Go to Homepage</a>
      </div>

    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="scripts/hamburger_menu.js" defer></script>
  <script src="scripts/header_footer.js" defer></script>
  <script src="scripts/signup.js"></script>

</body>
</html>
